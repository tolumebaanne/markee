name: Deploy Markee

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Pull latest code
        run: |
          cd ~/markee
          git fetch origin main
          git reset --hard origin/main

      - name: Install dependencies
        run: |
          cd ~/markee
          npm install --omit=dev

      - name: Restart monolith via PM2
        run: |
          cd ~/markee
          pm2 restart markee-monolith || pm2 start ecosystem.config.js --only markee-monolith

      - name: Verify gateway is up
        run: |
          echo "Waiting for gateway..."
          for i in 1 2 3 4 5 6; do
            sleep 5
            if curl -sf http://localhost:4000/health > /dev/null 2>&1; then
              echo "Gateway OK (attempt $i)"
              exit 0
            fi
            echo "Not ready yet (attempt $i), retrying..."
          done
          echo "Gateway did not respond after 30s — dumping pm2 logs:"
          pm2 logs markee-monolith --lines 50 --nostream || true
          exit 1
